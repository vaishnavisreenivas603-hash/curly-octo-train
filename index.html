<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
    
        body {
            background-color: #f0f8ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 10;
        }

        h1 { color: #ff69b4; margin-bottom: 10px; }
        p { color: #555; line-height: 1.6; }

        .btn {
            background: #ff69b4;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.2s;
        }

        .btn:hover { transform: scale(1.1); }

        /* Confetti animation */
        .confetti {
            position: absolute;
            width: 10px; height: 10px;
            background: #ffd700;
            top: -10px;
            border-radius: 50%;
            animation: fall 3s linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="title">Click to Reveal! 🎁</h1>
        <p id="message">I have a special message for you...</p>
        <button class="btn" onclick="revealBirthday()">Open Gift</button>
    </div>

    <script>
      
        function revealBirthday() {
            document.getElementById('title').innerText = "Happy Birthday!";
            document.getElementById('message').innerHTML = "Wishing you a day filled with love and laughter. <br> You are amazing! ✨";
            
           
            for(let i=0; i<50; i++) {
                createConfetti();
            }
        }

        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            confetti.style.left = Math.random() * 100 + "vw";
            confetti.style.animationDuration = (Math.random() * 2 + 3) + "s";
            confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 70%, 60%)`;
            document.body.appendChild(confetti);
        }
    </script>
</body>
</html>
